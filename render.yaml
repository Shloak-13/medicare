services:
  - type: web
    name: medicare-api
    runtime: docker
    rootDir: apps/api
    plan: starter
    autoDeploy: true
    envVars:
      - key: APP_NAME
        value: Family Healthcare API
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: medicare-db
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "120"
      - key: CORS_ORIGINS
        sync: false
      - key: UPLOAD_DIR
        value: storage/uploads
      - key: MAX_UPLOAD_BYTES
        value: "10485760"
    disk:
      name: medicare-uploads
      mountPath: /app/storage/uploads
      sizeGB: 1

databases:
  - name: medicare-db
    plan: starter
    databaseName: family_healthcare
    user: family_healthcare

