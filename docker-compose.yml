services:
  db:
    image: postgres:16-alpine
    container_name: family-healthcare-db
    environment:
      POSTGRES_DB: family_healthcare
      POSTGRES_USER: family_healthcare
      POSTGRES_PASSWORD: family_healthcare_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U family_healthcare -d family_healthcare"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

